<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Casino Toolkit</title>

  <!-- ── Anti-FOUC: apply saved theme before CSS loads ── -->
  <script>
    try {
      var t = localStorage.getItem('casinoToolkit_theme') || 'dark';
      document.documentElement.dataset.theme = t;
    } catch(e) {}
  </script>

  <!-- ── PWA ── -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#07100a" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ede6d8" media="(prefers-color-scheme: light)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CasinoKit">

  <!-- ── Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <link rel="icon" type="image/x-icon" href="favicon.svg">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app">
    <div class="splash">
      <div class="splash-logo">Casino Toolkit</div>
      <div class="splash-sub">Loading…</div>
    </div>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
